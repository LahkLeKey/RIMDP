services:
  postgres:
    image: postgres:16
    container_name: rimdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rimdp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rimdp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rimdp"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rimdp-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://host.docker.internal:4000
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rimdp_pg_data: